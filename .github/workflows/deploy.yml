name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

# 设置 token 访问权限
permissions:
  contents: read
  pages: write
  id-token: write

# 限制并发，确保部署顺序
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到 v4
        with:
          fetch-depth: 0 

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4（不再需要手动指定版本，会自动处理）
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4 # 升级到 v4
        with:
          node-version: 20 # 建议用稳定的 v20
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 升级到 v5

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: |
          pnpm run docs:build
          # VitePress 默认会自动生成 .nojekyll，通常不需要手动 touch

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 升级到 v3 (对应内部 upload-artifact v4)
        with:
          path: .vitepress/dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 升级到 v4